<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technician Profile | T.I.T.E</title>
    <link rel="stylesheet" href="css/stylesheet.css">
    <link rel="stylesheet" href="css/technician-portal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="tech-layout">
    <button class="tech-sidebar-toggle" id="techSidebarToggle" aria-label="Toggle sidebar">
        <i class="fa-solid fa-bars"></i>
    </button>
    <div class="tech-sidebar-overlay" id="techSidebarOverlay"></div>
    <aside class="tech-sidebar" id="techSidebar">
        <div class="tech-logo"><h2>T.I.T.E Tech</h2></div>
        <div class="tech-profile"><div id="techAvatar" class="tech-avatar"><i class="fa-solid fa-user"></i></div><div id="techName">Technician</div><small id="techEmail"></small></div>
        <ul class="tech-nav">
            <li><a href="technician-dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
            <li><a href="technician-assignments.html"><i class="fa-solid fa-clipboard-list"></i> Assignments</a></li>
            <li><a class="active" href="technician-profile.html"><i class="fa-solid fa-user"></i> Profile</a></li>
            <li><a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to Site</a></li>
        </ul>
    </aside>
    <main class="tech-main">
        <div class="tech-header"><h1>My Profile</h1></div>

        <div class="tech-panel">
            <div class="alert alert-error" id="profileError" role="alert" style="display: none;"></div>
            <div class="alert alert-success" id="profileSuccess" role="alert" style="display: none;"></div>
            <div class="alert alert-warning" id="profilePending" role="alert" style="display: none; background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; padding: 1rem; border-radius: 8px; margin-bottom: 1rem;"></div>

            <div class="form-group"><label>Name</label><input id="profileName" disabled></div>
            <div class="form-group"><label>Email</label><input id="profileEmail" disabled></div>
            <div class="form-group"><label>Phone</label><input id="profilePhone" disabled></div>
            <div class="form-group"><label>Specialties</label><div id="profileSpecialties" style="padding: 0.5rem; background: #f9fafb; border-radius: 6px; border: 1px solid #e5e7eb; color: var(--text-light);">None</div></div>

            <div id="profileViewActions" style="margin-top: 1rem;">
                <button class="btn btn-primary" type="button" onclick="techPortal.toggleEditMode()">Edit Profile</button>
            </div>
            <div id="profileEditActions" style="display: none; margin-top: 1rem; gap: 0.5rem;">
                <button class="btn btn-primary" type="button" onclick="techPortal.saveProfile()">Save Changes</button>
                <button class="btn" type="button" onclick="techPortal.toggleEditMode()">Cancel</button>
            </div>
        </div>
    </main>
</div>
<script src="js/database.js"></script>
<script src="js/technician-portal.js"></script>
<script>techPortal.init('profile');</script>
</body>
</html>
